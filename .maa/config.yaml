# Defaults
# NOTE: not yet consumed by scripts
default_domain: frontend

# Trusted source policy
# NOTE: not yet consumed by scripts
# Practices from authoritative sources can be evaluated without extra scrutiny.
# Practices from medium-trust sources require manual verification before approval.
min_trust_for_auto_eval: high
