# MAA local configuration
#
# SPRINT 1 STATUS: this file is scaffolded but NOT read at runtime.
# The scripts hardcode all paths relative to the repo root.
# Wiring config parsing is planned for a later sprint.
# Editing values here has no effect until that wiring is done.
#
# Fill in your name now; everything else can stay as-is until Sprint 2.

user: your-name

# Directories (relative to repo root)
# NOTE: not yet consumed by scripts — hardcoded to these same defaults
report_dir: reports/reviews
standards_dir: standards
policies_dir: policies
skills_dir: skills
candidates_dir: candidates
evaluations_dir: evaluations
